name: ClipMind
options:
  bundleIdPrefix: com.clipmind
  deploymentTarget:
    macOS: "12.4"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.7"
    MACOSX_DEPLOYMENT_TARGET: "12.4"
    PRODUCT_BUNDLE_IDENTIFIER: com.clipmind.app
    PRODUCT_NAME: "$(TARGET_NAME)"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift.git
    exactVersion: "0.15.0"
configs:
  Debug: debug
  Release: release
  DebugDev: debug
targets:
  ClipMind:
    type: application
    platform: macOS
    sources:
      - path: ClipMind
    dependencies:
      - package: SQLite.swift
        product: SQLite
    settings:
      base:
        INFOPLIST_FILE: ClipMind/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClipMind/Resources/ClipMind.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_TESTABILITY: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        DebugDev:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: CLIPMIND_DEV
  ClipMindTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClipMindTests
    dependencies:
      - target: ClipMind
      - package: SQLite.swift
        product: SQLite
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClipMind.app/Contents/MacOS/ClipMind"
  ClipMindUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ClipMindUITests
    dependencies:
      - target: ClipMind
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  ClipMind:
    build:
      targets:
        ClipMind: all
        ClipMindTests: [test]
        ClipMindUITests: [test]
    test:
      targets:
        - ClipMindTests
        - ClipMindUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
  ClipMind-Dev:
    build:
      targets:
        ClipMind: all
        ClipMindTests: [test]
        ClipMindUITests: [test]
    test:
      targets:
        - ClipMindTests
        - ClipMindUITests
      gatherCoverageData: true
      config: DebugDev
    run:
      config: DebugDev
    # archive: ClipMind-Dev 仅用于本地验证，不归档发布构建，archive 步骤跳过（AGENTS.md 第 10 节）
