name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    env:
      XCODE_PROJECT: ClipMind.xcodeproj
      XCODE_SCHEME: ClipMind
      XCODE_DESTINATION: 'platform=macOS'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-swiftlint-xcodegen
          restore-keys: brew-${{ runner.os }}-

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install tools
        run: |
          brew install swiftlint xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$XCODE_DESTINATION" \
            -configuration Debug \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --quiet

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$XCODE_DESTINATION" \
            -configuration Debug \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore
